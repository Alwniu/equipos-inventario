<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cayapa Heroica</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>💻 Cayapa Heroica</h2>
                <p>Monagas</p>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-target="view-register">
                    📝 Registrar Equipo
                </button>
                <button class="nav-btn" data-target="view-inventory">
                    🔍 Buscar e Inventario
                </button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h1>Control de Infraestructura Computacional</h1>
            </header>

            <div class="content-wrapper">
                <section id="view-register" class="view-section active">
                    <div class="form-section">
                        <h2>Captura de Datos</h2>
                        <form id="equipment-form">
                            <div class="form-group">
                                <input type="text" id="eq-serial" placeholder="Serial / ID del Equipo" required>
                            </div>
                            <div class="form-group">
                                <input type="text" id="eq-institution" placeholder="Institución Educativa" required>
                            </div>
                            <div class="form-group">
                                <select id="eq-status" required>
                                    <option value="" disabled selected>Clasificación Técnica...</option>
                                    <option value="Operativo">Operativo (Requiere software/mantenimiento)</option>
                                    <option value="Reparable">Reparable (Sustitución de componentes)</option>
                                    <option value="Desincorporación">Desincorporación (Canibalización)</option>
                                </select>
                            </div>
                            
                            <div class="form-group" style="grid-column: span 2;">
                                <label style="display: block; margin-bottom: 5px; color: var(--text-secondary); font-size: 0.9em;">
                                    Evidencia Fotográfica
                                </label>
                                <div class="camera-controls">
                                    <button type="button" id="btn-open-camera" class="btn-secondary">📸 Usar Cámara del Dispositivo</button>
                                    <span style="color: var(--text-secondary); font-size: 0.8em; margin: 5px 0;">O selecciona un archivo:</span>
                                    <input type="file" id="eq-image" accept="image/png, image/jpeg, image/jpg">
                                </div>
                                <div id="camera-container" style="display: none; margin-top: 15px;">
                                    <video id="video" autoplay playsinline></video>
                                    <div class="camera-actions">
                                        <button type="button" id="btn-take-photo" class="btn-primary">Capturar Foto</button>
                                        <button type="button" id="btn-close-camera" class="btn-danger">Cancelar</button>
                                    </div>
                                    <canvas id="canvas" style="display:none;"></canvas>
                                </div>
                                <div id="photo-preview-container" style="display: none; margin-top: 15px;">
                                    <img id="photo-preview" src="" alt="Previsualización">
                                    <button type="button" id="btn-discard-photo" class="btn-danger" style="margin-top: 10px; width: 100%;">Descartar Foto</button>
                                </div>
                            </div>

                            <div class="form-group" style="grid-column: span 2;">
                                <textarea id="eq-notes" placeholder="Notas del diagnóstico (ej. fallas en fuente de poder...)" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn-primary" style="grid-column: span 2; margin-top: 10px;">Guardar en Inventario</button>
                        </form>
                    </div>
                </section>

                <section id="view-inventory" class="view-section">
                    <div class="table-section">
                        <div class="inventory-header">
                            <h2>Base de Datos de Equipos</h2>
                            <div class="search-box">
                                <input type="text" id="search-input" placeholder="Buscar por serial, institución o estado...">
                            </div>
                        </div>
                        
                        <div class="table-responsive">
                            <table id="inventory-table">
                                <thead>
                                    <tr>
                                        <th>Imagen</th>
                                        <th>Serial</th>
                                        <th>Institución</th>
                                        <th>Estado</th>
                                        <th>Diagnóstico</th>
                                        <th>Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
